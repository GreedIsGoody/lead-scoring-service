services:
  db:
    image: postgres:15
    container_name: lead_scoring_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lead_scoring}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lead_scoring}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: lead_scoring_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-lead_scoring}
      - DEBUG=${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: